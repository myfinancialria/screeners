name: Daily NSE Screener + Strategy Journal

on:
  schedule:
    # 11:15 UTC = 16:45 IST, Mon–Fri (after the 15:30 IST close).
    # GitHub may delay scheduled runs by a few minutes under load.
    - cron: "15 11 * * 1-5"
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write        # commit the strategy journal DB back so history accumulates
  pages: write
  id-token: write

# only one deploy at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          FYERS_APP_ID=${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_KEY=${{ secrets.FYERS_SECRET_KEY }}
          FYERS_REDIRECT_URI=${{ secrets.FYERS_REDIRECT_URI }}
          FYERS_FY_ID=${{ secrets.FYERS_FY_ID }}
          FYERS_PIN=${{ secrets.FYERS_PIN }}
          FYERS_TOTP_SECRET=${{ secrets.FYERS_TOTP_SECRET }}
          FYERS_ACCESS_TOKEN=
          EOF

      - name: Generate FYERS access token (headless TOTP)
        run: python fyers_login.py

      - name: Build screener website
        run: python build_site.py --universe nse_all --min-value 10 --top 80

      - name: Build performance dashboard
        run: python build_performance.py --universe nse_all --days 500

      - name: Replay option-buying strategies (EOD paper trading)
        run: python eod_simulate.py

      - name: Build strategy journal report
        run: python build_journal.py

      - name: Persist strategy journal DB (accumulate history)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add strategy.db
          git diff --staged --quiet || git commit -m "chore: update strategy journal [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
